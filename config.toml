baseURL = "https://privorum.com"
languageCode = "en-us"
title = "Privorum — AI, Automation & Backend Engineering"
themesDir = "themes"
theme = "hugo-serif-theme"

[params]
  # In most cases you will only want to use either one of these. If you have Google Analytics included in your GTM tags don't put your GA ID here. Otherwise your data might be useless.
  google_analytics_id = ""
  google_tag_manager_id = ""

  [params.logo]
    mobile = "images/logo-mobile.svg"
    standard  = "images/logo.svg"
    alt = "Privorum — AI, Automation & Backend Engineering"

  [params.homepage_meta_tags]
    meta_description = "Privorum is a senior engineering consultancy for AI workflows, automation, and backend platforms. We design and ship production systems that hold up."
    meta_og_title = "Privorum — AI, Automation & Backend Engineering"
    meta_og_type = "website"
    meta_og_url = "https://privorum.com"
    meta_og_image = "https://privorum.com/images/og-cover.png"
    meta_og_description = "Privorum designs and ships AI workflows, automation, and backend platforms with the engineering discipline required for production."
    meta_twitter_card = "summary_large_image"
    meta_twitter_site = "@privorum"
    meta_twitter_creator = "@privorum"


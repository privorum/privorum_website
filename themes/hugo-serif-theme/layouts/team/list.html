{{ define "header_css" }}{{ end }}
{{ define "body_classes" }}page-team-list{{ end }}
{{ define "header_classes" }}{{ end }}

{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <div class="hero-eyebrow">Team</div>
    {{ .Content }}
  </div>
</section>

<section class="team-archive">
  <div class="container">
    <ol class="team-list">
      {{ range .Pages.ByWeight }}
      <li class="team-row">{{ .Render "summary" }}</li>
      {{ end }}
    </ol>
  </div>
</section>
{{ end }}

{{ define "header_css" }}{{ end }}
{{ define "body_classes" }}page-team-list{{ end }}
{{ define "header_classes" }}{{ end }}

{{ define "main" }}
<section class="page-hero{{ with .Params.intro_image }} page-hero--with-aside{{ end }}">
  <div class="container">
    <div class="page-hero-body">
      <div class="hero-eyebrow">Team</div>
      {{ .Content }}
    </div>
    {{ with .Params.intro_image }}
    <aside class="page-hero-aside" aria-hidden="true">
      <img src="{{ . | relURL }}" alt="" loading="lazy" />
    </aside>
    {{ end }}
  </div>
</section>

<section class="team-archive">
  <div class="container">
    <ol class="team-list">
      {{ range .Pages.ByWeight }}
      <li class="team-row">{{ .Render "summary" }}</li>
      {{ end }}
    </ol>
  </div>
</section>
{{ end }}

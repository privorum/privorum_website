{{ define "header_css" }}{{ end }}
{{ define "body_classes" }}page-default-list{{ end }}
{{ define "header_classes" }}{{ end }}

{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <div class="hero-eyebrow">{{ .Title }}</div>
    {{ .Content }}
  </div>
</section>

<section class="default-archive">
  <div class="container">
    <ol class="default-list">
      {{ range .Pages.ByWeight }}
      <li class="default-row">{{ .Render "summary" }}</li>
      {{ end }}
    </ol>
  </div>
</section>
{{ end }}

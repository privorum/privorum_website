{{ define "header_css" }}{{ end }}
{{ define "body_classes" }}page-contact{{ end }}
{{ define "header_classes" }}{{ end }}

{{ define "main" }}
<div class="container pb-6 pt-6 pt-md-10 pb-md-10">
  <div class="row justify-content-start{{ with .Params.intro_image }} single-with-aside{{ end }}">
    <div class="col-12 col-md-8">
      <div class="service service-single">
        <h1 class="title">{{.Title}}</h1>
        {{ partial "call.html" . }}
        <div class="content mt-4">{{.Content}}</div>
      </div>
    </div>
    {{ with .Params.intro_image }}
    <aside class="col-12 col-md-4 single-aside" aria-hidden="true">
      <img src="{{ . | relURL }}" alt="" loading="lazy" />
    </aside>
    {{ end }}
  </div>
</div>

{{ end }}
